<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaleto • VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        body { font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
        .market-card { transition: all 0.2s ease; }
        .market-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="bg-[#0a0a14] text-white">
    
    <!-- Header -->
    <div class="border-b border-white/10 sticky top-0 z-50 bg-[#0a0a14]/95 backdrop-blur">
        <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00ff9f] rounded-2xl flex items-center justify-center">
                    <span class="text-[#0a0a14] font-black text-2xl">S</span>
                </div>
                <div>
                    <span class="font-bold text-2xl tracking-tighter">Signaleto</span>
                    <span class="text-[#00ff9f] text-xs font-bold tracking-[1.5px] ml-1">VIP</span>
                </div>
            </div>
            <div class="flex items-center gap-x-3">
                <button onclick="showApiStatus()" class="hidden md:flex items-center gap-x-2 px-4 py-2 bg-white/5 hover:bg-white/10 rounded-3xl text-xs">
                    <span class="text-emerald-400">●</span>
                    <span>۱۲ منبع آنلاین</span>
                </button>
                <button onclick="showSettings()" class="w-9 h-9 flex items-center justify-center bg-white/5 hover:bg-white/10 rounded-2xl">
                    <i class="fa-solid fa-cog"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-5 py-6">
        
        <!-- Hero -->
        <div class="glass border border-white/10 rounded-3xl p-7 mb-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <div class="flex items-center gap-x-2 mb-2">
                        <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-xs font-bold rounded-full">LIVE</span>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-bold tracking-tighter leading-tight">
                        سیگنال دقیق.<br>تصمیم هوشمند.
                    </h1>
                </div>
                <div class="flex items-center gap-x-4">
                    <div>
                        <div class="text-xs text-white/60">دقت امروز</div>
                        <div class="text-6xl font-bold text-[#00ff9f] tabular-nums">87</div>
                    </div>
                    <button onclick="showActiveSignals()" class="px-7 py-4 bg-[#00ff9f] hover:bg-[#00e68c] text-[#0a0a14] font-bold rounded-3xl flex items-center gap-x-2 text-sm">
                        <i class="fa-solid fa-bolt-lightning"></i>
                        <span>سیگنال‌های فعال</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Markets -->
        <div class="flex items-center justify-between mb-4">
            <div class="font-semibold text-lg">بازارهای منتخب (۱۷ بازار)</div>
            <button onclick="refreshData()" class="text-xs px-4 py-2 bg-white/5 hover:bg-white/10 rounded-2xl flex items-center gap-x-2">
                <i class="fa-solid fa-sync-alt"></i>
                <span>به‌روزرسانی</span>
            </button>
        </div>

        <div id="markets-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- JS will fill this -->
        </div>

        <!-- Last Signal + Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-8">
            <div class="lg:col-span-2 glass border border-white/10 rounded-3xl p-6">
                <div class="font-semibold mb-3">سیگنال اخیر</div>
                <div class="flex items-center justify-between">
                    <div>
                        <div class="flex items-center gap-x-2">
                            <span class="font-bold text-2xl">BTC/USDT</span>
                            <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-2xl text-xs font-bold">Long</span>
                        </div>
                        <div class="text-3xl font-bold mt-1 tabular-nums">۲,۸۹۷,۴۵۰,۰۰۰</div>
                    </div>
                    <div class="text-right">
                        <div class="text-emerald-400 font-bold">🟢 خرید</div>
                        <div class="text-sm mt-1">اطمینان: <span class="font-bold">۸۷٪</span></div>
                    </div>
                </div>
            </div>

            <div class="glass border border-white/10 rounded-3xl p-6">
                <div class="font-semibold mb-4">عملکرد امروز</div>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <div class="text-2xl font-bold">۱۲۸</div>
                        <div class="text-xs text-white/60">کل سیگنال‌ها</div>
                    </div>
                    <div>
                        <div class="text-2xl font-bold text-emerald-400">۸۲٪</div>
                        <div class="text-xs text-white/60">موفقیت</div>
                    </div>
                    <div>
                        <div class="text-2xl font-bold">+۲۳.۸٪</div>
                        <div class="text-xs text-white/60">سود خالص</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
