<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaleto • Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
        }
        
        .glass {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
        }
        
        .market-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .market-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .neon-green {
            color: #00ff9f;
            text-shadow: 0 0 8px rgba(0, 255, 159, 0.4);
        }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e0e0e0;
        }
    </style>
</head>
<body class="bg-[#0a0a14] text-white">
    
    <!-- Header -->
    <div class="border-b border-white/10 sticky top-0 z-50 bg-[#0a0a14]/95 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00ff9f] rounded-2xl flex items-center justify-center shadow-[0_0_15px_rgba(0,255,159,0.5)]">
                    <span class="text-[#0a0a14] font-black text-2xl">S</span>
                </div>
                <div>
                    <span class="font-bold text-2xl tracking-tighter">Signaleto</span>
                    <span class="text-[#00ff9f] text-xs font-bold tracking-[2px] ml-1">PREMIUM</span>
                </div>
            </div>
            
            <div class="flex items-center gap-x-2">
                <!-- API Status -->
                <div onclick="showApiStatus()" 
                     class="hidden md:flex items-center gap-x-2 px-4 py-1.5 bg-white/5 hover:bg-white/10 rounded-3xl text-xs cursor-pointer">
                    <div class="flex items-center">
                        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse mr-1.5"></span>
                        <span class="text-emerald-400 text-xs font-medium">۱۲ منبع آنلاین</span>
                    </div>
                </div>
                
                <button onclick="showSettings()"
                        class="w-9 h-9 flex items-center justify-center bg-white/5 hover:bg-white/10 rounded-2xl">
                    <i class="fa-solid fa-cog text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-5 py-6">
        
        <!-- Hero / Quick Signal -->
        <div class="glass border border-white/10 rounded-3xl p-6 mb-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <div class="flex items-center gap-x-2 mb-2">
                        <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-xs font-bold rounded-full">LIVE</span>
                        <span class="text-sm text-white/60">آخرین به‌روزرسانی: همین الان</span>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-bold tracking-tighter">سیگنال دقیق.<br>تصمیم هوشمند.</h1>
                </div>
                
                <div class="flex items-center gap-x-4">
                    <div class="text-center">
                        <div class="text-xs text-white/60">دقت امروز</div>
                        <div class="text-5xl font-bold text-[#00ff9f] tabular-nums">87</div>
                        <div class="text-xs -mt-1 text-emerald-400">+۹٪</div>
                    </div>
                    
                    <button onclick="showActiveSignals()"
                            class="px-8 py-4 bg-[#00ff9f] hover:bg-[#00e68c] transition-all text-[#0a0a14] font-bold rounded-3xl flex items-center gap-x-3 shadow-lg">
                        <i class="fa-solid fa-bolt-lightning"></i>
                        <span>سیگنال‌های فعال</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Markets -->
        <div class="mb-3 flex items-center justify-between">
            <div class="section-title">بازارهای منتخب (۱۷ بازار)</div>
            <button onclick="refreshData()" 
                    class="text-xs flex items-center gap-x-2 text-white/70 hover:text-white px-3 py-1.5 rounded-2xl hover:bg-white/5">
                <i class="fa-solid fa-sync-alt text-xs"></i>
                <span>به‌روزرسانی</span>
            </button>
        </div>

        <div id="markets-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- Markets populated by JS -->
        </div>

        <!-- Last Signal + Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-8">
            
            <!-- Last Signal -->
            <div class="lg:col-span-2 glass border border-white/10 rounded-3xl p-6">
                <div class="section-title mb-4">سیگنال اخیر</div>
                <div class="flex items-center justify-between">
                    <div>
                        <div class="flex items-center gap-x-3">
                            <span class="text-3xl font-bold">BTC/USDT</span>
                            <span class="px-4 py-1 bg-emerald-500/20 text-emerald-400 rounded-3xl text-sm font-bold">Long</span>
                        </div>
                        <div class="text-4xl font-bold mt-1 tabular-nums">۲,۸۹۷,۴۵۰,۰۰۰</div>
                    </div>
                    
                    <div class="text-right">
                        <div class="text-emerald-400 font-bold text-xl">🟢 خرید</div>
                        <div class="text-sm mt-1">اطمینان: <span class="font-bold">۸۷٪</span></div>
                    </div>
                </div>
            </div>

            <!-- Performance -->
            <div class="glass border border-white/10 rounded-3xl p-6">
                <div class="section-title mb-4">عملکرد امروز</div>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <div class="text-3xl font-bold">۱۲۸</div>
                        <div class="text-xs text-white/60 mt-1">کل سیگنال‌ها</div>
                    </div>
                    <div>
                        <div class="text-3xl font-bold text-emerald-400">۸۲٪</div>
                        <div class="text-xs text-white/60 mt-1">موفقیت</div>
                    </div>
                    <div>
                        <div class="text-3xl font-bold">+۲۳.۸٪</div>
                        <div class="text-xs text-white/60 mt-1">سود خالص</div>
                    </div>
                </div>
            </div>
            
        </div>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
